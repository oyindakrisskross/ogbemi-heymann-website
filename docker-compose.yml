services:
  app:
    image: ${APP_IMAGE:-ghcr.io/oyindakrisskross/ogbemi-heymann-website:latest}
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4100
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ogbemi_heymann}
      MYSQL_USER: ${MYSQL_APP_USER:-ogbemi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:4100:4100"
    volumes:
      - uploads:/app/uploads
      - ./public/downloads:/app/public/downloads

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ogbemi_heymann}
      MYSQL_USER: ${MYSQL_APP_USER:-ogbemi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  mysql_data:
  uploads:
